<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | RICHE RACS</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(18, 18, 18, 0.96);
            --text: #f5f5f5;
            --muted: #9a9a9a;
            --accent: #d02d2d;
            --border: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #070707 0%, #040404 100%);
            display: flex;
            flex-direction: column;
        }
        header {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 34px;
            background: rgba(10,10,10,0.96);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .brand { font-size: 0.88rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; }
        nav { display: flex; gap: 18px; flex-wrap: wrap; }
        nav a { color: #ccc; text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.14em; }
        nav a:hover { color: #fff; }
        main { flex: 1; padding: 46px 34px 60px; }
        .page-head { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .page-head h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); }
        .cart-panel { max-width: 1200px; margin: 0 auto; display: grid; gap: 24px; }
        .cart-list { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 24px; display: grid; gap: 18px; }
        .cart-item { display: grid; grid-template-columns: 1fr auto auto auto; gap: 16px; align-items: center; padding: 18px 16px; border-radius: 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .item-info { display: grid; gap: 8px; }
        .item-name { font-weight: 700; }
        .item-meta { color: var(--muted); font-size: 0.94rem; }
        .item-price { font-weight: 700; }
        .item-quantity { display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 8px 10px; }
        .qty-btn { width: 34px; height: 34px; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; background: transparent; color: #fff; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: rgba(255,255,255,0.06); }
        .item-remove { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 999px; padding: 10px 18px; cursor: pointer; }
        .cart-summary { display: flex; flex-direction: column; gap: 16px; padding: 24px; border-radius: 28px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .summary-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .summary-row strong { font-size: 1.1rem; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 14px; }
        .btn { border: none; border-radius: 999px; padding: 16px 26px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; font-weight: 700; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; }
        .empty-state { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 32px; text-align: center; color: #ccc; }
        .empty-state a { color: var(--accent); text-decoration: none; }
        @media (max-width: 820px) { .cart-item { grid-template-columns: 1fr; } .summary-row { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <header>
        <div class="brand">RICHE RACS</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="best-sellers.html">Best Sellers</a>
            <a href="hoodies.html">Hoodies</a>
            <a href="pants.html">Pants</a>
            <a href="accessories.html">Accessories</a>
            <a href="cart.html">Cart</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <div class="page-head">
            <div>
                <h1>Your Cart</h1>
                <p style="margin: 0; color: #999;">Review items, remove products, or continue shopping before checkout.</p>
            </div>
        </div>
        <div class="cart-panel">
            <div id="empty-cart" class="empty-state" style="display:none;">
                Your cart is empty. <a href="index.html">Browse products</a> to add items.
            </div>
            <div id="cart-items" class="cart-list"></div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Total</span>
                    <strong id="cart-total">$0.00</strong>
                </div>
                <div class="btn-row">
                    <button id="continue-shopping" class="btn btn-secondary">Continue shopping</button>
                    <a href="checkout.html" class="btn btn-primary">Proceed to checkout</a>
                </div>
            </div>
        </div>
    </main>
    <script src="cart.js" defer></script>
</body>
</html>
